<svg width="560" height="420" viewBox="0 0 560 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Theme tokens -->
    <linearGradient id="themeGrad" x1="120" y1="80" x2="460" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5BC2DC"/>
      <stop offset="1" stop-color="#2FA8C7"/>
    </linearGradient>

    <linearGradient id="panelGrad" x1="120" y1="130" x2="420" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E9FBFF"/>
      <stop offset="1" stop-color="#D6F4FB"/>
    </linearGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0B1B24" flood-opacity="0.18"/>
    </filter>

    <filter id="tinyShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0B1B24" flood-opacity="0.14"/>
    </filter>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M18 0H0V18" fill="none" stroke="#0B1B24" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="560" height="420" rx="28" fill="white"/>
  <rect x="28" y="24" width="504" height="372" rx="24" fill="url(#grid)"/>

  <!-- Floating accent blobs -->
  <path d="M88 110C60 98 58 62 86 46C120 26 154 52 150 86C146 118 112 122 88 110Z" fill="#5BC2DC" opacity="0.12"/>
  <path d="M470 120C444 106 448 72 474 58C508 40 536 72 522 102C510 128 490 132 470 120Z" fill="#2FA8C7" opacity="0.10"/>

  <!-- Main illustration group -->
  <g filter="url(#softShadow)">
    <!-- Back card -->
    <g opacity="0.95">
      <rect x="120" y="108" width="330" height="220" rx="22" transform="rotate(-8 120 108)" fill="url(#themeGrad)"/>
      <rect x="165" y="150" width="150" height="12" rx="6" transform="rotate(-8 165 150)" fill="#0B1B24" opacity="0.20"/>
      <rect x="165" y="176" width="190" height="12" rx="6" transform="rotate(-8 165 176)" fill="#0B1B24" opacity="0.16"/>
      <rect x="165" y="202" width="120" height="12" rx="6" transform="rotate(-8 165 202)" fill="#0B1B24" opacity="0.12"/>
    </g>

    <!-- Front analytics panel -->
    <g>
      <rect x="108" y="120" width="340" height="240" rx="22" fill="url(#panelGrad)" stroke="#0B1B24" stroke-opacity="0.10" stroke-width="2"/>

      <!-- Header pills -->
      <rect x="140" y="150" width="96" height="16" rx="8" fill="#5BC2DC" opacity="0.28"/>
      <rect x="246" y="150" width="64" height="16" rx="8" fill="#0B1B24" opacity="0.08"/>

      <!-- Chart area -->
      <rect x="140" y="182" width="276" height="118" rx="16" fill="white" stroke="#0B1B24" stroke-opacity="0.08" stroke-width="2"/>

      <!-- Bars -->
      <g opacity="0.95">
        <rect x="164" y="246" width="18" height="38" rx="6" fill="#5BC2DC"/>
        <rect x="196" y="232" width="18" height="52" rx="6" fill="#5BC2DC" opacity="0.85"/>
        <rect x="228" y="214" width="18" height="70" rx="6" fill="#2FA8C7" opacity="0.85"/>
        <rect x="260" y="238" width="18" height="46" rx="6" fill="#5BC2DC" opacity="0.70"/>
        <rect x="292" y="222" width="18" height="62" rx="6" fill="#2FA8C7" opacity="0.70"/>
      </g>

      <!-- Line -->
      <path d="M164 238 C186 224, 202 236, 214 220 C232 196, 250 206, 270 218 C288 228, 308 210, 324 206 C342 202, 360 214, 380 202"
            stroke="#0B1B24" stroke-opacity="0.55" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Empty-state text lines -->
      <rect x="140" y="316" width="210" height="14" rx="7" fill="#0B1B24" opacity="0.10"/>
      <rect x="140" y="340" width="160" height="14" rx="7" fill="#0B1B24" opacity="0.08"/>
    </g>
  </g>

  <!-- Magnifier (no result) -->
  <g filter="url(#tinyShadow)">
    <circle cx="398" cy="286" r="44" fill="white" stroke="#0B1B24" stroke-opacity="0.14" stroke-width="3"/>
    <circle cx="398" cy="286" r="28" fill="#E9FBFF" stroke="#5BC2DC" stroke-width="6"/>
    <path d="M430 318 L468 356" stroke="#5BC2DC" stroke-width="12" stroke-linecap="round"/>
    <path d="M387 286 H409" stroke="#0B1B24" stroke-opacity="0.45" stroke-width="6" stroke-linecap="round"/>
    <path d="M398 275 V297" stroke="#0B1B24" stroke-opacity="0.25" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- FMCG hint: small bottle outline -->
  <g opacity="0.9" filter="url(#tinyShadow)">
    <path d="M88 278 C88 266 98 258 110 258 H126 C138 258 148 266 148 278 V286
             C148 292 146 298 142 302 L140 304 V340
             C140 356 128 368 112 368 C96 368 84 356 84 340 V304 L82 302
             C78 298 76 292 76 286 V278 C76 266 86 258 98 258"
          fill="white" stroke="#0B1B24" stroke-opacity="0.14" stroke-width="3" stroke-linejoin="round"/>
    <path d="M98 258 V244 C98 238 103 234 109 234 H115 C121 234 126 238 126 244 V258"
          fill="#E9FBFF" stroke="#5BC2DC" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="90" y="300" width="56" height="22" rx="10" fill="#5BC2DC" opacity="0.22"/>
    <rect x="98" y="306" width="40" height="10" rx="5" fill="#2FA8C7" opacity="0.55"/>
  </g>

  <!-- Tiny dots for "tech" -->
  <g opacity="0.45">
    <circle cx="470" cy="214" r="3" fill="#5BC2DC"/>
    <circle cx="486" cy="230" r="3" fill="#5BC2DC"/>
    <circle cx="502" cy="246" r="3" fill="#5BC2DC"/>
    <circle cx="86" cy="210" r="3" fill="#2FA8C7"/>
    <circle cx="70" cy="226" r="3" fill="#2FA8C7"/>
    <circle cx="54" cy="242" r="3" fill="#2FA8C7"/>
  </g>
</svg>
